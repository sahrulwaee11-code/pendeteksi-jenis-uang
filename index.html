<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Deteksi Uang</title>

<!-- ONNX Runtime -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background:#0f172a;
        color:white;
        font-family:Arial, Helvetica, sans-serif;
        display:flex;
        flex-direction:column;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    h1{
        margin-bottom:10px;
        text-align:center;
        font-size:2rem;
    }

    .subtitle{
        color:#94a3b8;
        margin-bottom:20px;
    }

    .dashboard{
        display:flex;
        gap:15px;
        margin-bottom:20px;
        flex-wrap:wrap;
        justify-content:center;
    }

    .card{
        background:#1e293b;
        padding:12px 18px;
        border-radius:12px;
        border:1px solid #334155;
        min-width:160px;
        text-align:center;
    }

    .card h3{
        font-size:0.9rem;
        color:#94a3b8;
        margin-bottom:5px;
    }

    .card p{
        font-size:1rem;
        font-weight:bold;
    }

    .btn-start{
        padding:14px 28px;
        border:none;
        border-radius:12px;
        background:#22c55e;
        color:white;
        font-size:1rem;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
        margin-bottom:20px;
    }

    .btn-start:hover{
        background:#16a34a;
        transform:scale(1.03);
    }

    .container{
        position:relative;
        width:100%;
        max-width:900px;
        aspect-ratio:4/3;
        border-radius:20px;
        overflow:hidden;
        border:2px solid #334155;
        box-shadow:0 0 30px rgba(0,0,0,0.5);
        background:black;
    }

    video,
    canvas{
        position:absolute;
        width:100%;
        height:100%;
        top:0;
        left:0;
        object-fit:cover;
    }

    #overlay{
        z-index:10;
        pointer-events:none;
    }

    .footer{
        margin-top:20px;
        color:#64748b;
        font-size:0.9rem;
        text-align:center;
    }

    @media(max-width:768px){
        h1{
            font-size:1.5rem;
        }

        .card{
            min-width:130px;
        }
    }
</style>
</head>

<body>

<h1>🛡️ AI Deteksi Jenis Bentuk Uang</h1>
<p class="subtitle">Dibuat oleh: Sahrul Hilmawan</p>

<div class="dashboard">

    <div class="card">
        <h3>Status AI</h3>
        <p id="status">MATI</p>
    </div>

    <div class="card">
        <h3>FPS</h3>
        <p id="fps">0</p>
    </div>

    <div class="card">
        <h3>Deteksi</h3>
        <p id="detection">-</p>
    </div>

</div>

<button id="btn-init" class="btn-start">
    AKTIFKAN KAMERA
</button>

<div class="container">

    <video
        id="webcam"
        autoplay
        muted
        playsinline>
    </video>

    <canvas id="overlay"></canvas>

</div>

<!-- Hidden processor -->
<canvas
    id="processor"
    width="640"
    height="640"
    style="display:none;">
</canvas>

<script>

const video = document.getElementById("webcam");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

const statusText = document.getElementById("status");
const fpsText = document.getElementById("fps");
const detectionText = document.getElementById("detection");

const button = document.getElementById("btn-init");

let model = null;
let lastTime = performance.now();

async function initCamera(){

    try{

        statusText.innerText = "Mengaktifkan Kamera...";

        const stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:"environment",
                width:{ideal:1280},
                height:{ideal:720}
            },
            audio:false
        });

        video.srcObject = stream;

        await video.play();

        resizeCanvas();

        statusText.innerText = "Kamera Aktif";

        loadModel();

    }catch(error){

        console.error(error);

        statusText.innerText = "Kamera Gagal";
        alert("Tidak bisa mengakses kamera.");

    }

}

function resizeCanvas(){

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

}

window.addEventListener("resize", resizeCanvas);

async function loadModel(){

    try{

        statusText.innerText = "Loading Model AI...";

        /*
        GANTI model.onnx
        dengan nama model AI kalian
        */

        model = await ort.InferenceSession.create("model.onnx");

        statusText.innerText = "AI Siap";

        detectFrame();

    }catch(error){

        console.error(error);

        statusText.innerText = "Model Gagal Dimuat";

    }

}

async function detectFrame(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /*
    ===========================
    TEMPAT PROSES AI
    ===========================
    Di sini nanti preprocessing,
    inference ONNX,
    dan drawing box
    */

    drawDemoBox();

    updateFPS();

    requestAnimationFrame(detectFrame);

}

function drawDemoBox(){

    ctx.strokeStyle = "#00ff88";
    ctx.lineWidth = 4;

    ctx.strokeRect(
        canvas.width/2 - 100,
        canvas.height/2 - 80,
        200,
        160
    );

    ctx.fillStyle = "#00ff88";
    ctx.font = "20px Arial";

    ctx.fillText(
        "Uang Terdeteksi",
        canvas.width/2 - 90,
        canvas.height/2 - 90
    );

    detectionText.innerText = "Uang";
}

function updateFPS(){

    const now = performance.now();

    const fps = Math.round(1000 / (now - lastTime));

    lastTime = now;

    fpsText.innerText = fps;

}

button.addEventListener("click", initCamera);

</script>

</body>
</html>
